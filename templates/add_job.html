{% extends "layout.html" %}

{% block title %}Yeni İş{% endblock %}

{% block content %}

<h1>📦 Yeni İş Ekle</h1>

<br>

<form method="POST">

    <input type="text" name="job_name" placeholder="İş Adı" required>

    <br><br>

    <input type="text" name="material" placeholder="Malzeme">

    <br><br>

    <input type="number" name="quantity" placeholder="Adet">

    <br><br>

    <label>Üretim Tarihi</label>
    <input type="date" name="production_date">

    <br><br>

    <label>Teslim Tarihi</label>
    <input type="date" name="delivery_date">

    <br><br>

    <textarea
        name="notes"
        placeholder="Notlar"
        rows="5"
        style="width:100%;background:#161b22;color:white;border:1px solid #30363d;padding:15px;border-radius:10px;"
    ></textarea>

    <br><br>

    <button class="add-button">
        💾 Kaydet
    </button>

</form>

{% endblock %}
