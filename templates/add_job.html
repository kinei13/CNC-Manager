{% extends "layout.html" %}

{% block title %}Yeni İş{% endblock %}

{% block content %}

<div class="page-header">

    <h1>📦 Yeni İş Ekle</h1>

</div>

<form method="POST">

    <label>İş Adı</label>

    <input
        type="text"
        name="job_name"
        placeholder="Örneğin: Flanş Ø80"
        required
    >

    <br><br>

    <label>Müşteri</label>

    <select name="customer_id">

        <option value="">Müşteri Seçiniz</option>

        {% for customer in customers %}

        <option value="{{ customer['id'] }}">

            {{ customer["name"] }}

        </option>

        {% endfor %}

    </select>

    <br><br>

    <label>Malzeme</label>

    <input
        type="text"
        name="material"
        placeholder="C45 / Alüminyum / Paslanmaz"
    >

    <br><br>

    <label>Adet</label>

    <input
        type="number"
        name="quantity"
        placeholder="500"
    >

    <br><br>

    <label>Üretim Tarihi</label>

    <input
        type="date"
        name="production_date"
    >

    <br><br>

    <label>Teslim Tarihi</label>

    <input
        type="date"
        name="delivery_date"
    >

    <br><br>

    <label>Notlar</label>

    <textarea
        name="notes"
        rows="5"
        placeholder="İş ile ilgili notlar..."
    ></textarea>

    <br><br>

    <button class="add-button">

        💾 İşi Kaydet

    </button>

</form>

{% endblock %}
