{% extends "layout.html" %}

{% block title %}Yeni İş{% endblock %}

{% block content %}

<div class="page-header">

    <h1>📦 Yeni İş Ekle</h1>

    <a
        href="/jobs"
        class="add-button"
    >
        ← Geri
    </a>

</div>


<div class="machine-card">

    <form method="POST">

        <label>İş Adı</label>

        <input
            type="text"
            name="job_name"
            placeholder="Örneğin: Flanş Ø80"
            required
        >


        <br><br>


        <label>🏭 Makine</label>

        <select
            name="machine_id"
            required
        >

            <option value="">
                Makine Seçiniz
            </option>

            {% for machine in machines %}

                <option
                    value="{{ machine['id'] }}"

                    {% if selected_machine_id == machine["id"] %}
                        selected
                    {% endif %}
                >
                    {{ machine["name"] }}
                </option>

            {% endfor %}

        </select>


        <br><br>


        <div class="field-title-row">

            <label>👤 Müşteri</label>

            <button
                type="button"
                class="small-action-button"
                id="show-customer-create"
            >
                + Yeni Müşteri
            </button>

        </div>


        <select
            name="customer_id"
            id="customer-select"
        >

            <option value="">
                Müşteri Seçiniz
            </option>

            {% for customer in customers %}

                <option value="{{ customer['id'] }}">
                    {{ customer["name"] }}
                </option>

            {% endfor %}

        </select>


        <div
            id="quick-customer-box"
            class="quick-create-box"
            style="display: none;"
        >

            <label>Yeni Müşteri Adı</label>

            <div class="quick-create-row">

                <input
                    type="text"
                    id="new-customer-name"
                    placeholder="Örneğin: ABC Makine"
                >

                <button
                    type="button"
                    class="add-button"
                    id="create-customer-button"
                >
                    Oluştur
                </button>

            </div>

            <p
                id="customer-create-message"
                class="form-message"
            ></p>

        </div>


        <br><br>


        <div class="field-title-row">

            <label>
                📁 Müşteri Klasörü / Proje
            </label>

            <button
                type="button"
                class="small-action-button"
                id="show-folder-create"
            >
                + Yeni Klasör / Proje
            </button>

        </div>


        <select
            name="folder_id"
            id="folder-select"
            disabled
        >

            <option value="">
                Önce müşteri seçiniz
            </option>

        </select>


        <div
            id="quick-folder-box"
            class="quick-create-box"
            style="display: none;"
        >

            <label>Yeni Klasör / Proje Adı</label>

            <div class="quick-create-row">

                <input
                    type="text"
                    id="new-folder-name"
                    placeholder="Örneğin: Baykar"
                >

                <button
                    type="button"
                    class="add-button"
                    id="create-folder-button"
                >
                    Oluştur
                </button>

            </div>

            <p
                id="folder-create-message"
                class="form-message"
            ></p>

        </div>


        <br><br>


        <label>Malzeme</label>

        <input
            type="text"
            name="material"
            placeholder="304 / 1040 / Alüminyum"
        >


        <br><br>


        <label>Adet</label>

        <input
            type="number"
            name="quantity"
            placeholder="500"
            min="0"
        >


        <br><br>


        <label>▶️ İşe Başlama Tarihi</label>

        <div class="date-select-row">

            <select name="start_day">

                <option value="">Gün</option>

                {% for day in range(1, 32) %}

                    <option value="{{ day }}">
                        {{ day }}
                    </option>

                {% endfor %}

            </select>


            <select name="start_month">

                <option value="">Ay</option>

                {% for month_number, month_name in months.items() %}

                    <option value="{{ month_number }}">
                        {{ month_name }}
                    </option>

                {% endfor %}

            </select>


            <select name="start_year">

                <option value="">Yıl</option>

                {% for year in years|reverse %}

                    <option value="{{ year }}">
                        {{ year }}
                    </option>

                {% endfor %}

            </select>

        </div>


        <br><br>


        <label>✅ İşi Bitirme Tarihi</label>

        <div class="date-select-row">

            <select name="end_day">

                <option value="">Gün</option>

                {% for day in range(1, 32) %}

                    <option value="{{ day }}">
                        {{ day }}
                    </option>

                {% endfor %}

            </select>


            <select name="end_month">

                <option value="">Ay</option>

                {% for month_number, month_name in months.items() %}

                    <option value="{{ month_number }}">
                        {{ month_name }}
                    </option>

                {% endfor %}

            </select>


            <select name="end_year">

                <option value="">Yıl</option>

                {% for year in years|reverse %}

                    <option value="{{ year }}">
                        {{ year }}
                    </option>

                {% endfor %}

            </select>

        </div>


        <br><br>


        <label>🚚 Teslim Tarihi</label>

        <div class="date-select-row">

            <select name="delivery_day">

                <option value="">Gün</option>

                {% for day in range(1, 32) %}

                    <option value="{{ day }}">
                        {{ day }}
                    </option>

                {% endfor %}

            </select>


            <select name="delivery_month">

                <option value="">Ay</option>

                {% for month_number, month_name in months.items() %}

                    <option value="{{ month_number }}">
                        {{ month_name }}
                    </option>

                {% endfor %}

            </select>


            <select name="delivery_year">

                <option value="">Yıl</option>

                {% for year in years|reverse %}

                    <option value="{{ year }}">
                        {{ year }}
                    </option>

                {% endfor %}

            </select>

        </div>


        <br><br>


        <label>Notlar</label>

        <textarea
            name="notes"
            rows="6"
            placeholder="İş ile ilgili notlar..."
        ></textarea>


        <br><br>


        <button
            type="submit"
            class="add-button"
        >
            💾 İşi Kaydet
        </button>

    </form>

</div>


<script>

    const customerSelect =
        document.getElementById("customer-select");

    const folderSelect =
        document.getElementById("folder-select");


    const showCustomerCreate =
        document.getElementById("show-customer-create");

    const quickCustomerBox =
        document.getElementById("quick-customer-box");

    const newCustomerName =
        document.getElementById("new-customer-name");

    const createCustomerButton =
        document.getElementById("create-customer-button");

    const customerCreateMessage =
        document.getElementById("customer-create-message");


    const showFolderCreate =
        document.getElementById("show-folder-create");

    const quickFolderBox =
        document.getElementById("quick-folder-box");

    const newFolderName =
        document.getElementById("new-folder-name");

    const createFolderButton =
        document.getElementById("create-folder-button");

    const folderCreateMessage =
        document.getElementById("folder-create-message");


    async function getFolders(customerId) {

        const response = await fetch(
            `/api/customer/${customerId}/folders`
        );

        if (!response.ok) {

            throw new Error(
                "Klasörler yüklenemedi."
            );

        }

        return await response.json();

    }


    async function loadFolders(
        customerId,
        selectedFolderName = ""
    ) {

        folderSelect.innerHTML = "";


        if (!customerId) {

            folderSelect.disabled = true;

            folderSelect.innerHTML = `
                <option value="">
                    Önce müşteri seçiniz
                </option>
            `;

            return;

        }


        folderSelect.disabled = true;

        folderSelect.innerHTML = `
            <option value="">
                Klasörler yükleniyor...
            </option>
        `;


        try {

            const folders = await getFolders(
                customerId
            );


            folderSelect.innerHTML = `
                <option value="">
                    Genel İşler
                </option>
            `;


            folders.forEach(
                function (folder) {

                    const option =
                        document.createElement("option");

                    option.value = folder.id;

                    option.textContent = folder.name;


                    if (
                        selectedFolderName &&
                        folder.name.toLocaleLowerCase("tr-TR") ===
                        selectedFolderName.toLocaleLowerCase("tr-TR")
                    ) {

                        option.selected = true;

                    }


                    folderSelect.appendChild(
                        option
                    );

                }
            );


            folderSelect.disabled = false;

        }

        catch (error) {

            folderSelect.innerHTML = `
                <option value="">
                    Klasörler yüklenemedi
                </option>
            `;

        }

    }


    customerSelect.addEventListener(
        "change",
        function () {

            quickFolderBox.style.display =
                "none";

            newFolderName.value = "";

            folderCreateMessage.textContent =
                "";

            loadFolders(
                customerSelect.value
            );

        }
    );


    showCustomerCreate.addEventListener(
        "click",
        function () {

            if (
                quickCustomerBox.style.display === "none"
            ) {

                quickCustomerBox.style.display =
                    "block";

                newCustomerName.focus();

            }

            else {

                quickCustomerBox.style.display =
                    "none";

            }

        }
    );


    createCustomerButton.addEventListener(
        "click",
        async function () {

            const name =
                newCustomerName.value.trim();


            if (!name) {

                customerCreateMessage.textContent =
                    "Müşteri adını yaz.";

                return;

            }


            createCustomerButton.disabled = true;

            customerCreateMessage.textContent =
                "Oluşturuluyor...";


            try {

                const response = await fetch(
                    "/api/customers/create",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify(
                            {
                                name: name
                            }
                        )
                    }
                );


                const data =
                    await response.json();


                if (
                    !response.ok ||
                    !data.success
                ) {

                    customerCreateMessage.textContent =
                        data.message ||
                        "Müşteri oluşturulamadı.";

                    return;

                }


                let option = Array.from(
                    customerSelect.options
                ).find(
                    function (item) {

                        return item.value ==
                            data.customer.id;

                    }
                );


                if (!option) {

                    option =
                        document.createElement(
                            "option"
                        );

                    option.value =
                        data.customer.id;

                    option.textContent =
                        data.customer.name;

                    customerSelect.appendChild(
                        option
                    );

                }


                customerSelect.value =
                    data.customer.id;


                newCustomerName.value = "";

                customerCreateMessage.textContent =
                    "✅ Müşteri oluşturuldu.";


                await loadFolders(
                    data.customer.id
                );


                setTimeout(
                    function () {

                        quickCustomerBox.style.display =
                            "none";

                        customerCreateMessage.textContent =
                            "";

                    },
                    800
                );

            }

            catch (error) {

                customerCreateMessage.textContent =
                    "Müşteri oluşturulamadı.";

            }

            finally {

                createCustomerButton.disabled =
                    false;

            }

        }
    );


    showFolderCreate.addEventListener(
        "click",
        function () {

            const customerId =
                customerSelect.value;


            if (!customerId) {

                folderCreateMessage.textContent =
                    "Önce müşteri seçmelisin.";

                quickFolderBox.style.display =
                    "block";

                return;

            }


            folderCreateMessage.textContent =
                "";


            if (
                quickFolderBox.style.display === "none"
            ) {

                quickFolderBox.style.display =
                    "block";

                newFolderName.focus();

            }

            else {

                quickFolderBox.style.display =
                    "none";

            }

        }
    );


    createFolderButton.addEventListener(
        "click",
        async function () {

            const customerId =
                customerSelect.value;

            const folderName =
                newFolderName.value.trim();


            if (!customerId) {

                folderCreateMessage.textContent =
                    "Önce müşteri seçmelisin.";

                return;

            }


            if (!folderName) {

                folderCreateMessage.textContent =
                    "Klasör / proje adını yaz.";

                return;

            }


            createFolderButton.disabled = true;

            folderCreateMessage.textContent =
                "Oluşturuluyor...";


            try {

                const formData =
                    new FormData();

                formData.append(
                    "folder_name",
                    folderName
                );


                const response = await fetch(
                    `/customer/${customerId}`,
                    {
                        method: "POST",
                        body: formData
                    }
                );


                if (!response.ok) {

                    folderCreateMessage.textContent =
                        "Klasör oluşturulamadı.";

                    return;

                }


                await loadFolders(
                    customerId,
                    folderName
                );


                newFolderName.value = "";

                folderCreateMessage.textContent =
                    "✅ Klasör / proje oluşturuldu ve seçildi.";


                setTimeout(
                    function () {

                        quickFolderBox.style.display =
                            "none";

                        folderCreateMessage.textContent =
                            "";

                    },
                    1000
                );

            }

            catch (error) {

                folderCreateMessage.textContent =
                    "Klasör oluşturulamadı.";

            }

            finally {

                createFolderButton.disabled =
                    false;

            }

        }
    );

</script>

{% endblock %}
