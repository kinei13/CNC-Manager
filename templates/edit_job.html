{% extends "layout.html" %}

{% block title %}İşi Düzenle{% endblock %}

{% block content %}

<div class="page-header">

    <div>

        <h1>✏️ İşi Düzenle</h1>

        <p>
            {{ job["job_name"] }}
        </p>

    </div>


    <a
        href="/job/{{ job['id'] }}"
        class="add-button"
    >
        ← Geri
    </a>

</div>


<div class="machine-card">

    <form method="POST">

        <label>İş Adı</label>

        <input
            type="text"
            name="job_name"
            value="{{ job['job_name'] }}"
            required
        >


        <br><br>


        <label>🏭 Makine</label>

        <select
            name="machine_id"
            required
        >

            {% for machine in machines %}

                <option
                    value="{{ machine['id'] }}"

                    {% if job["machine_id"] == machine["id"] %}
                        selected
                    {% endif %}
                >
                    {{ machine["name"] }}
                </option>

            {% endfor %}

        </select>


        <br><br>


        <label>👤 Müşteri</label>

        <select
            name="customer_id"
            id="customer-select"
        >

            <option value="">
                Müşteri Seçilmemiş
            </option>


            {% for customer in customers %}

                <option
                    value="{{ customer['id'] }}"

                    {% if job["customer_id"] == customer["id"] %}
                        selected
                    {% endif %}
                >
                    {{ customer["name"] }}
                </option>

            {% endfor %}

        </select>


        <br><br>


        <label>
            📁 Müşteri Klasörü / Proje
        </label>

        <select
            name="folder_id"
            id="folder-select"

            {% if not job["customer_id"] %}
                disabled
            {% endif %}
        >

            {% if not job["customer_id"] %}

                <option value="">
                    Önce müşteri seçiniz
                </option>

            {% else %}

                <option value="">
                    Genel İşler
                </option>


                {% for folder in folders %}

                    <option
                        value="{{ folder['id'] }}"

                        {% if job["folder_id"] == folder["id"] %}
                            selected
                        {% endif %}
                    >
                        {{ folder["name"] }}
                    </option>

                {% endfor %}

            {% endif %}

        </select>


        <br><br>


        <label>Malzeme</label>

        <input
            type="text"
            name="material"
            value="{{ job['material'] or '' }}"
        >


        <br><br>


        <label>Adet</label>

        <input
            type="number"
            name="quantity"
            value="{{ job['quantity'] or '' }}"
            min="0"
        >


        <br><br>


        <label>▶️ İşe Başlama Tarihi</label>

        <div class="date-select-row">

            <select name="start_day">

                <option value="">
                    Gün
                </option>


                {% for day in range(1, 32) %}

                    <option
                        value="{{ day }}"

                        {% if start_parts["day"] == day %}
                            selected
                        {% endif %}
                    >
                        {{ day }}
                    </option>

                {% endfor %}

            </select>


            <select name="start_month">

                <option value="">
                    Ay
                </option>


                {% for month_number, month_name in months.items() %}

                    <option
                        value="{{ month_number }}"

                        {% if start_parts["month"] == month_number %}
                            selected
                        {% endif %}
                    >
                        {{ month_name }}
                    </option>

                {% endfor %}

            </select>


            <select name="start_year">

                <option value="">
                    Yıl
                </option>


                {% for year in years|reverse %}

                    <option
                        value="{{ year }}"

                        {% if start_parts["year"] == year %}
                            selected
                        {% endif %}
                    >
                        {{ year }}
                    </option>

                {% endfor %}

            </select>

        </div>


        <br><br>


        <label>✅ İşi Bitirme Tarihi</label>

        <div class="date-select-row">

            <select name="end_day">

                <option value="">
                    Gün
                </option>


                {% for day in range(1, 32) %}

                    <option
                        value="{{ day }}"

                        {% if end_parts["day"] == day %}
                            selected
                        {% endif %}
                    >
                        {{ day }}
                    </option>

                {% endfor %}

            </select>


            <select name="end_month">

                <option value="">
                    Ay
                </option>


                {% for month_number, month_name in months.items() %}

                    <option
                        value="{{ month_number }}"

                        {% if end_parts["month"] == month_number %}
                            selected
                        {% endif %}
                    >
                        {{ month_name }}
                    </option>

                {% endfor %}

            </select>


            <select name="end_year">

                <option value="">
                    Yıl
                </option>


                {% for year in years|reverse %}

                    <option
                        value="{{ year }}"

                        {% if end_parts["year"] == year %}
                            selected
                        {% endif %}
                    >
                        {{ year }}
                    </option>

                {% endfor %}

            </select>

        </div>


        <br><br>


        <label>🚚 Teslim Tarihi</label>

        <div class="date-select-row">

            <select name="delivery_day">

                <option value="">
                    Gün
                </option>


                {% for day in range(1, 32) %}

                    <option
                        value="{{ day }}"

                        {% if delivery_parts["day"] == day %}
                            selected
                        {% endif %}
                    >
                        {{ day }}
                    </option>

                {% endfor %}

            </select>


            <select name="delivery_month">

                <option value="">
                    Ay
                </option>


                {% for month_number, month_name in months.items() %}

                    <option
                        value="{{ month_number }}"

                        {% if delivery_parts["month"] == month_number %}
                            selected
                        {% endif %}
                    >
                        {{ month_name }}
                    </option>

                {% endfor %}

            </select>


            <select name="delivery_year">

                <option value="">
                    Yıl
                </option>


                {% for year in years|reverse %}

                    <option
                        value="{{ year }}"

                        {% if delivery_parts["year"] == year %}
                            selected
                        {% endif %}
                    >
                        {{ year }}
                    </option>

                {% endfor %}

            </select>

        </div>


        <br><br>


        <label>📌 Durum</label>

        <select name="status">

            <option
                value="Devam Ediyor"

                {% if job["status"] == "Devam Ediyor" %}
                    selected
                {% endif %}
            >
                Devam Ediyor
            </option>


            <option
                value="Tamamlandı"

                {% if job["status"] == "Tamamlandı" %}
                    selected
                {% endif %}
            >
                Tamamlandı
            </option>


            <option
                value="Beklemede"

                {% if job["status"] == "Beklemede" %}
                    selected
                {% endif %}
            >
                Beklemede
            </option>


            <option
                value="İptal"

                {% if job["status"] == "İptal" %}
                    selected
                {% endif %}
            >
                İptal
            </option>

        </select>


        <br><br>


        <label>📝 Genel Notlar</label>

        <textarea
            name="notes"
            rows="6"
            placeholder="İş ile ilgili genel bilgiler..."
        >{{ job["notes"] or "" }}</textarea>


        <br><br>


        <button
            type="submit"
            class="add-button"
        >
            💾 Değişiklikleri Kaydet
        </button>

    </form>

</div>


<script>

    const customerSelect =
        document.getElementById(
            "customer-select"
        );

    const folderSelect =
        document.getElementById(
            "folder-select"
        );


    async function loadFolders(customerId) {

        folderSelect.innerHTML = "";


        if (!customerId) {

            folderSelect.disabled = true;

            folderSelect.innerHTML = `
                <option value="">
                    Önce müşteri seçiniz
                </option>
            `;

            return;

        }


        folderSelect.disabled = true;

        folderSelect.innerHTML = `
            <option value="">
                Klasörler yükleniyor...
            </option>
        `;


        try {

            const response = await fetch(
                `/api/customer/${customerId}/folders`
            );


            if (!response.ok) {

                throw new Error(
                    "Klasörler yüklenemedi."
                );

            }


            const folders =
                await response.json();


            folderSelect.innerHTML = `
                <option value="">
                    Genel İşler
                </option>
            `;


            folders.forEach(
                function (folder) {

                    const option =
                        document.createElement(
                            "option"
                        );

                    option.value =
                        folder.id;

                    option.textContent =
                        folder.name;

                    folderSelect.appendChild(
                        option
                    );

                }
            );


            folderSelect.disabled = false;

        }

        catch (error) {

            folderSelect.innerHTML = `
                <option value="">
                    Klasörler yüklenemedi
                </option>
            `;

        }

    }


    customerSelect.addEventListener(
        "change",
        function () {

            loadFolders(
                customerSelect.value
            );

        }
    );

</script>

{% endblock %}
