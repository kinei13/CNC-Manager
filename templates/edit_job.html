{% extends "layout.html" %}

{% block title %}İşi Düzenle{% endblock %}

{% block content %}

<div class="page-header">

    <div>

        <h1>✏️ İşi Düzenle</h1>

        <p>
            {{ job["job_name"] }}
        </p>

    </div>

    <a
        href="/job/{{ job['id'] }}"
        class="add-button"
    >
        ← Geri
    </a>

</div>


<div class="machine-card">

    <form method="POST">

        <label>İş Adı</label>

        <input
            type="text"
            name="job_name"
            value="{{ job['job_name'] }}"
            required
        >


        <br><br>


        <label>Müşteri</label>

        <select name="customer_id">

            <option value="">
                Müşteri Belirtilmemiş
            </option>

            {% for customer in customers %}

                <option
                    value="{{ customer['id'] }}"

                    {% if job["customer_id"] == customer["id"] %}
                        selected
                    {% endif %}
                >
                    {{ customer["name"] }}
                </option>

            {% endfor %}

        </select>


        <br><br>


        <label>Malzeme</label>

        <input
            type="text"
            name="material"
            value="{{ job['material'] or '' }}"
        >


        <br><br>


        <label>Adet</label>

        <input
            type="number"
            name="quantity"
            value="{{ job['quantity'] or '' }}"
            min="0"
        >


        <br><br>


        <label>▶️ İşe Başlama Tarihi</label>

        <div class="date-select-row">

            <select name="start_day">

                <option value="">Gün</option>

                {% for day in range(1, 32) %}

                    <option
                        value="{{ day }}"

                        {% if start_parts["day"] == day %}
                            selected
                        {% endif %}
                    >
                        {{ day }}
                    </option>

                {% endfor %}

            </select>


            <select name="start_month">

                <option value="">Ay</option>

                {% for month_number, month_name in months.items() %}

                    <option
                        value="{{ month_number }}"

                        {% if start_parts["month"] == month_number %}
                            selected
                        {% endif %}
                    >
                        {{ month_name }}
                    </option>

                {% endfor %}

            </select>


            <select name="start_year">

                <option value="">Yıl</option>

                {% for year in years|reverse %}

                    <option
                        value="{{ year }}"

                        {% if start_parts["year"] == year %}
                            selected
                        {% endif %}
                    >
                        {{ year }}
                    </option>

                {% endfor %}

            </select>

        </div>


        <br><br>


        <label>✅ İşi Bitirme Tarihi</label>

        <div class="date-select-row">

            <select name="end_day">

                <option value="">Gün</option>

                {% for day in range(1, 32) %}

                    <option
                        value="{{ day }}"

                        {% if end_parts["day"] == day %}
                            selected
                        {% endif %}
                    >
                        {{ day }}
                    </option>

                {% endfor %}

            </select>


            <select name="end_month">

                <option value="">Ay</option>

                {% for month_number, month_name in months.items() %}

                    <option
                        value="{{ month_number }}"

                        {% if end_parts["month"] == month_number %}
                            selected
                        {% endif %}
                    >
                        {{ month_name }}
                    </option>

                {% endfor %}

            </select>


            <select name="end_year">

                <option value="">Yıl</option>

                {% for year in years|reverse %}

                    <option
                        value="{{ year }}"

                        {% if end_parts["year"] == year %}
                            selected
                        {% endif %}
                    >
                        {{ year }}
                    </option>

                {% endfor %}

            </select>

        </div>


        <br><br>


        <label>🚚 Teslim Tarihi</label>

        <div class="date-select-row">

            <select name="delivery_day">

                <option value="">Gün</option>

                {% for day in range(1, 32) %}

                    <option
                        value="{{ day }}"

                        {% if delivery_parts["day"] == day %}
                            selected
                        {% endif %}
                    >
                        {{ day }}
                    </option>

                {% endfor %}

            </select>


            <select name="delivery_month">

                <option value="">Ay</option>

                {% for month_number, month_name in months.items() %}

                    <option
                        value="{{ month_number }}"

                        {% if delivery_parts["month"] == month_number %}
                            selected
                        {% endif %}
                    >
                        {{ month_name }}
                    </option>

                {% endfor %}

            </select>


            <select name="delivery_year">

                <option value="">Yıl</option>

                {% for year in years|reverse %}

                    <option
                        value="{{ year }}"

                        {% if delivery_parts["year"] == year %}
                            selected
                        {% endif %}
                    >
                        {{ year }}
                    </option>

                {% endfor %}

            </select>

        </div>


        <br><br>


        <label>Durum</label>

        <select name="status">

            <option
                value="Devam Ediyor"

                {% if job["status"] == "Devam Ediyor" %}
                    selected
                {% endif %}
            >
                Devam Ediyor
            </option>


            <option
                value="Bekliyor"

                {% if job["status"] == "Bekliyor" %}
                    selected
                {% endif %}
            >
                Bekliyor
            </option>


            <option
                value="Tamamlandı"

                {% if job["status"] == "Tamamlandı" %}
                    selected
                {% endif %}
            >
                Tamamlandı
            </option>


            <option
                value="İptal"

                {% if job["status"] == "İptal" %}
                    selected
                {% endif %}
            >
                İptal
            </option>

        </select>


        <br><br>


        <label>Notlar</label>

        <textarea
            name="notes"
            rows="7"
        >{{ job["notes"] or "" }}</textarea>


        <br><br>


        <button
            type="submit"
            class="add-button"
        >
            💾 Değişiklikleri Kaydet
        </button>

    </form>

</div>

{% endblock %}
