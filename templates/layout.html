<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}CNC Manager{% endblock %}
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

<div class="sidebar">

    <h2>⚙️ CNC Manager</h2>


    <div style="margin-bottom: 25px;">

        <input
            type="text"
            id="live-search"
            placeholder="🔎 İş, malzeme, program..."
            autocomplete="off"
            value="{{ request.args.get('q', '') }}"
        >

    </div>


    <ul>

        <li>
            <a href="/">
                🏠 Dashboard
            </a>
        </li>

        <li>
            <a href="/machines">
                🏭 Makineler
            </a>
        </li>

        <li>
            <a href="/customers">
                👥 Müşteriler
            </a>
        </li>

        <li>
            <a href="/jobs">
                📦 İşler
            </a>
        </li>

        <li>
            <a href="#">
                🧾 Faturalar
            </a>
        </li>

        <li>
            <a href="#">
                📊 Raporlar
            </a>
        </li>

        <li>
            <a href="#">
                ⚙️ Ayarlar
            </a>
        </li>

    </ul>

</div>


<div class="main">

    {% block content %}
    {% endblock %}

</div>


<script>

    const searchInput =
        document.getElementById("live-search");

    const mainContent =
        document.querySelector(".main");

    let searchTimer = null;

    let activeRequest = null;


    async function loadPage(url) {

        if (activeRequest) {
            activeRequest.abort();
        }

        activeRequest = new AbortController();


        try {

            const response = await fetch(
                url,
                {
                    signal: activeRequest.signal
                }
            );


            if (!response.ok) {
                return;
            }


            const html =
                await response.text();


            const parser =
                new DOMParser();


            const documentResult =
                parser.parseFromString(
                    html,
                    "text/html"
                );


            const newMain =
                documentResult.querySelector(
                    ".main"
                );


            if (newMain) {

                mainContent.innerHTML =
                    newMain.innerHTML;

            }

        }

        catch (error) {

            if (error.name !== "AbortError") {

                console.error(
                    "Arama hatası:",
                    error
                );

            }

        }

    }


    searchInput.addEventListener(
        "input",
        function () {

            clearTimeout(searchTimer);


            const query =
                searchInput.value.trim();


            searchTimer = setTimeout(
                function () {

                    if (query === "") {

                        history.replaceState(
                            null,
                            "",
                            "/"
                        );


                        loadPage("/");

                        return;

                    }


                    const params =
                        new URLSearchParams();


                    params.set(
                        "q",
                        query
                    );


                    const searchUrl =
                        "/search?" +
                        params.toString();


                    history.replaceState(
                        null,
                        "",
                        searchUrl
                    );


                    loadPage(
                        searchUrl
                    );

                },
                250
            );

        }
    );


    searchInput.addEventListener(
        "keydown",
        function (event) {

            if (event.key === "Enter") {

                event.preventDefault();

            }

        }
    );

</script>

</body>

</html>
